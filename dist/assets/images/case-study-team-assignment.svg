<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
<defs>
  <style>
    text { font-family: "Noto Sans CJK JP", "Noto Sans JP", sans-serif; }
  </style>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f5f9f7"/>
    <stop offset="100%" stop-color="#fafaf7"/>
  </linearGradient>
  <!-- 緑矢印マーカー -->
  <marker id="mG" viewBox="0 0 8 8" refX="7" refY="4"
          markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0.5 L7,4 L0,7.5 Z" fill="#2a6041"/>
  </marker>
  <!-- オレンジ矢印マーカー -->
  <marker id="mO" viewBox="0 0 8 8" refX="7" refY="4"
          markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0.5 L7,4 L0,7.5 Z" fill="#c87533"/>
  </marker>
  <!-- 緑破線矢印マーカー -->
  <marker id="mGd" viewBox="0 0 8 8" refX="7" refY="4"
          markerWidth="5" markerHeight="5" orient="auto">
    <path d="M0,0.5 L7,4 L0,7.5 Z" fill="#2a6041" opacity="0.55"/>
  </marker>
</defs>

<!-- 背景 -->
<rect width="800" height="420" fill="url(#bg)" rx="12"/>
<rect width="800" height="420" fill="none" stroke="#e0ddd6" stroke-width="1.5" rx="12"/>

<!-- タイトル -->
<text x="400" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#2a6041">データの流れ</text>
<line x1="290" y1="48" x2="510" y2="48" stroke="#2a6041" stroke-width="1.5" opacity="0.3"/>

<!-- ===== 矢印（ボックスより先に描画 → ボックスで上書き）===== -->

<!-- 1→2 水平 -->
<path d="M190,135 L240,135" fill="none" stroke="#2a6041" stroke-width="2" marker-end="url(#mG)"/>

<!-- 2→3 水平 -->
<path d="M380,135 L430,133" fill="none" stroke="#2a6041" stroke-width="2" marker-end="url(#mG)"/>

<!-- 3→4 水平 -->
<path d="M585,133 L625,135" fill="none" stroke="#2a6041" stroke-width="2" marker-end="url(#mG)"/>

<!-- 4→5a 折れ線 オレンジ -->
<path d="M692,180 L692,228 L614,228 L614,268" fill="none" stroke="#c87533" stroke-width="2" marker-end="url(#mO)"/>

<!-- 4→5b 折れ線 オレンジ -->
<path d="M692,180 L692,228 L740,228 L740,268" fill="none" stroke="#c87533" stroke-width="2" marker-end="url(#mO)"/>

<!-- 6→3 折れ線 破線緑 -->
<path d="M124,244 L124,196 L420,196 L420,133 L430,133" fill="none" stroke="#2a6041" stroke-width="1.8"
      stroke-dasharray="6,4" marker-end="url(#mGd)" opacity="0.55"/>

<!-- ===== ノード（矢印の上に重ねる）===== -->

<!-- N1: 調整さんCSV（オレンジ枠） -->
<rect x="50" y="90" width="140" height="90" rx="8"
      fill="white" stroke="#c87533" stroke-width="2"/>
<rect x="50" y="90" width="140" height="24" rx="8" fill="#fdf4ec"/>
<rect x="50" y="106" width="140" height="8" fill="#fdf4ec"/>
<text x="120" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#c87533">調整さん CSV</text>
<text x="120" y="127" text-anchor="middle" font-size="10" fill="#5a5a5a">氏名・グループ</text>
<text x="120" y="141" text-anchor="middle" font-size="10" fill="#5a5a5a">役割・出欠情報</text>
<text x="120" y="156" text-anchor="middle" font-size="10" fill="#5a5a5a">遅刻時刻コメント</text>
<text x="120" y="172" text-anchor="middle" font-size="9.5" fill="#c87533" font-weight="500">43名分</text>

<!-- N2: データ整理（緑枠） -->
<rect x="240" y="90" width="140" height="90" rx="8"
      fill="white" stroke="#2a6041" stroke-width="2"/>
<rect x="240" y="90" width="140" height="24" rx="8" fill="#e8f3ed"/>
<rect x="240" y="106" width="140" height="8" fill="#e8f3ed"/>
<text x="310" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#2a6041">データ整理</text>
<text x="310" y="127" text-anchor="middle" font-size="10" fill="#5a5a5a">参加者を役割別に</text>
<text x="310" y="141" text-anchor="middle" font-size="10" fill="#5a5a5a">分類・グループ化</text>
<text x="310" y="158" text-anchor="middle" font-size="9.5" fill="#2a6041">受講生 / サポーター</text>
<text x="310" y="172" text-anchor="middle" font-size="9.5" fill="#2a6041">遅刻者を識別</text>

<!-- N3: AIエンジン（塗り潰し・強調） -->
<rect x="430" y="75" width="155" height="116" rx="10" fill="#2a6041"/>
<rect x="430" y="75" width="155" height="26" rx="10" fill="#1d4a30"/>
<rect x="430" y="93" width="155" height="8" fill="#1d4a30"/>
<text x="507" y="92" text-anchor="middle" font-size="11" font-weight="700" fill="white">AI 自動探索エンジン</text>
<text x="507" y="115" text-anchor="middle" font-size="10" fill="#b8dcc8">8つの制約を同時に判定</text>
<text x="507" y="130" text-anchor="middle" font-size="10" fill="#b8dcc8">全パターンを高速探索</text>
<line x1="448" y1="141" x2="567" y2="141" stroke="#c87533" stroke-width="1.5" opacity="0.7"/>
<text x="507" y="155" text-anchor="middle" font-size="10.5" font-weight="700" fill="white">違反0件の解を発見</text>
<text x="507" y="172" text-anchor="middle" font-size="9.5" fill="#c87533">最適解を自動選択</text>

<!-- N4: 編成結果（緑枠） -->
<rect x="625" y="90" width="135" height="90" rx="8"
      fill="white" stroke="#2a6041" stroke-width="2"/>
<rect x="625" y="90" width="135" height="24" rx="8" fill="#e8f3ed"/>
<rect x="625" y="106" width="135" height="8" fill="#e8f3ed"/>
<text x="692" y="105" text-anchor="middle" font-size="11" font-weight="700" fill="#2a6041">編成結果</text>
<text x="692" y="127" text-anchor="middle" font-size="10" fill="#5a5a5a">チーム1〜7 確定</text>
<text x="692" y="141" text-anchor="middle" font-size="10" fill="#5a5a5a">1回目・2回目</text>
<text x="692" y="158" text-anchor="middle" font-size="9.5" fill="#2a6041">全制約チェック済</text>
<text x="692" y="172" text-anchor="middle" font-size="9.5" fill="#2a6041">違反0件を確認</text>

<!-- N5a: CSV出力（オレンジ枠） -->
<rect x="556" y="268" width="116" height="72" rx="8"
      fill="white" stroke="#c87533" stroke-width="2"/>
<rect x="556" y="268" width="116" height="22" rx="8" fill="#fdf4ec"/>
<rect x="556" y="283" width="116" height="7" fill="#fdf4ec"/>
<text x="614" y="282" text-anchor="middle" font-size="10.5" font-weight="700" fill="#c87533">CSV ファイル</text>
<text x="614" y="304" text-anchor="middle" font-size="10" fill="#5a5a5a">参加者全員の</text>
<text x="614" y="318" text-anchor="middle" font-size="10" fill="#5a5a5a">チーム配置一覧</text>
<text x="614" y="333" text-anchor="middle" font-size="9.5" fill="#c87533">配布・管理用</text>

<!-- N5b: PPTX出力（オレンジ枠） -->
<rect x="682" y="268" width="116" height="72" rx="8"
      fill="white" stroke="#c87533" stroke-width="2"/>
<rect x="682" y="268" width="116" height="22" rx="8" fill="#fdf4ec"/>
<rect x="682" y="283" width="116" height="7" fill="#fdf4ec"/>
<text x="740" y="282" text-anchor="middle" font-size="10.5" font-weight="700" fill="#c87533">PowerPoint</text>
<text x="740" y="304" text-anchor="middle" font-size="10" fill="#5a5a5a">当日配布用</text>
<text x="740" y="318" text-anchor="middle" font-size="10" fill="#5a5a5a">スライド 2枚</text>
<text x="740" y="333" text-anchor="middle" font-size="9.5" fill="#c87533">既存デザイン維持</text>

<!-- N6: 制約条件（緑破線枠） -->
<rect x="50" y="244" width="148" height="116" rx="8"
      fill="white" stroke="#2a6041" stroke-width="1.5" stroke-dasharray="5,3"/>
<rect x="50" y="244" width="148" height="22" rx="8" fill="#e8f3ed"/>
<rect x="50" y="259" width="148" height="7" fill="#e8f3ed"/>
<text x="124" y="258" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2a6041">制約条件（8項目）</text>
<text x="60" y="278" font-size="9.5" fill="#5a5a5a">· 同グループ同士は別チーム</text>
<text x="60" y="293" font-size="9.5" fill="#5a5a5a">· 遅刻者には補佐を配置</text>
<text x="60" y="308" font-size="9.5" fill="#5a5a5a">· 2回目は異なる顔ぶれに</text>
<text x="60" y="323" font-size="9.5" fill="#5a5a5a">· チーム人数バランス保持</text>
<text x="60" y="338" font-size="9.5" fill="#5a5a5a">· チーム長は別チームへ移動</text>
<text x="124" y="354" text-anchor="middle" font-size="9" fill="#2a6041" opacity="0.7">…ほか 3項目</text>

<!-- 凡例 -->
<g transform="translate(50,390)">
  <line x1="0" y1="7" x2="22" y2="7" stroke="#2a6041" stroke-width="2" marker-end="url(#mG)"/>
  <text x="28" y="11" font-size="10" fill="#5a5a5a">データの流れ</text>
  <line x1="118" y1="7" x2="140" y2="7" stroke="#2a6041" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#mGd)" opacity="0.55"/>
  <text x="146" y="11" font-size="10" fill="#5a5a5a">制約を入力</text>
  <line x1="230" y1="7" x2="252" y2="7" stroke="#c87533" stroke-width="2" marker-end="url(#mO)"/>
  <text x="258" y="11" font-size="10" fill="#5a5a5a">出力ファイル</text>
</g>
</svg>